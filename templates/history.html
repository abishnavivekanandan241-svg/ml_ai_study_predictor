{% extends "base.html" %}
{% block content %}

<h1>History</h1>

<table border="1" cellpadding="10">
  <tr>
    <th>Study</th>
    <th>Absences</th>
    <th>Failures</th>
    <th>Prediction</th>
  </tr>

  {% for row in rows %}
  <tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
